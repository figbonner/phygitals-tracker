<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phygitals Tracker v5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-amber: #f59e0b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-orange: #b45309;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-amber), var(--accent-green), var(--accent-blue));
            width: 0%;
            z-index: 1000;
            transition: width 0.3s ease;
        }

        .progress-bar.complete {
            width: 100%;
        }

        .status-bar {
            position: fixed;
            top: 8px;
            right: 16px;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-label {
            color: var(--text-secondary);
        }

        .status-value {
            color: var(--accent-green);
            font-weight: 600;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .hero-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border-top: 3px solid var(--accent-blue);
        }

        .hero-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .hero-card .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 4px 0;
        }

        .hero-card .sub {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .hero-card:nth-child(5) .value {
            color: var(--accent-red);
        }

        .hero-card:nth-child(6) .value {
            color: var(--accent-green);
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin: 28px 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .best-rip-section {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(26, 35, 50, 0.5) 100%);
            border: 2px solid var(--accent-amber);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .best-rip-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .best-rip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .best-rip-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-amber);
        }

        .best-rip-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .best-rip-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .rip-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
            position: relative;
        }

        .rip-card:first-child {
            border-color: var(--accent-amber);
        }

        .rip-card .rip-rank {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-amber);
            background: rgba(245, 158, 11, 0.15);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .rip-card .rip-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .rip-card .rip-cat {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .rip-card .rip-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .rip-card .rip-label {
            color: var(--text-secondary);
        }

        .rip-card .rip-val {
            text-align: right;
            font-weight: 600;
        }

        .rip-card .rip-reason {
            margin-top: 8px;
            font-size: 11px;
            color: var(--accent-green);
            font-style: italic;
            border-top: 1px solid var(--border);
            padding-top: 6px;
        }

        .market-trends {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .trend-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }

        .trend-card .cat-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .trend-card .metric {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .trend-card .metric-val {
            font-weight: 600;
            color: var(--text-primary);
        }

        .pull-feed {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            max-height: 260px;
            overflow: hidden;
            position: relative;
        }

        .pull-feed-scroll {
            overflow-y: auto;
            max-height: 220px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .pull-feed-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .pull-feed-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .pull-feed-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .pull-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            font-size: 12px;
        }

        .pull-item:hover {
            background: rgba(30, 41, 59, 0.3);
        }

        .pull-rarity {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .rarity-common {
            background: #94a3b8;
        }

        .rarity-uncommon {
            background: var(--accent-green);
        }

        .rarity-rare {
            background: var(--accent-blue);
        }

        .rarity-epic {
            background: var(--accent-purple);
        }

        .rarity-legendary {
            background: var(--accent-red);
        }

        .rarity-mythic {
            background: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
        }

        .pull-info {
            flex: 1;
            min-width: 0;
        }

        .pull-title {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pull-detail {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .pull-value {
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .pull-time {
            font-size: 11px;
            color: var(--text-secondary);
            flex-shrink: 0;
            width: 50px;
            text-align: right;
        }

        .pull-feed-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px;
            font-size: 13px;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .leaderboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .lb-section {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
        }

        .tab-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab-btn {
            padding: 5px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
        }

        .tab-btn.active {
            background: var(--accent-green);
            color: #000;
            border-color: var(--accent-green);
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 6px 8px;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 8px;
            border-top: 1px solid rgba(30, 41, 59, 0.5);
        }

        tr.me-row {
            background: rgba(30, 41, 59, 0.3);
            border-left: 3px solid var(--accent-amber);
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
        }

        .rank-1 {
            background: #fbbf24;
            color: #000;
        }

        .rank-2 {
            background: #94a3b8;
            color: #000;
        }

        .rank-3 {
            background: #d97706;
            color: #000;
        }

        .points-col {
            color: var(--accent-green);
        }

        .prize-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .prize-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .prize-card .rank-title {
            font-size: 20px;
            font-weight: 800;
        }

        .prize-card .prize-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .p1 { color: #fbbf24; }
        .p2 { color: #94a3b8; }
        .p3 { color: #d97706; }
        .p4 { color: var(--accent-purple); }
        .p5 { color: var(--accent-green); }
        .p6 { color: var(--accent-blue); }
        .p7 { color: var(--accent-red); }
        .p8 { color: var(--text-secondary); }
        .p9 { color: var(--text-secondary); }
        .p10 { color: var(--text-secondary); }

        .pack-table-wrap {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 24px;
        }

        .pack-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
        }

        .filter-btn.active {
            background: var(--accent-blue);
            color: #fff;
            border-color: var(--accent-blue);
        }

        .pack-table {
            width: 100%;
            font-size: 12px;
        }

        .pack-table th {
            position: sticky;
            top: 0;
            background: rgba(10, 14, 26, 0.8);
            z-index: 2;
        }

        .cat-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cat-pokemon { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .cat-basketball { background: rgba(245, 158, 11, 0.2); color: var(--accent-amber); }
        .cat-baseball { background: rgba(168, 85, 247, 0.2); color: var(--accent-purple); }
        .cat-football { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .cat-soccer { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .cat-onepiece { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .cat-yugioh { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .cat-creator { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="status-bar" id="statusBar">
        <div class="status-item">
            <span class="status-label">Time:</span>
            <span class="status-value" id="statusTime">--:--</span>
        </div>
        <div class="status-item">
            <span class="status-label">SOL:</span>
            <span class="status-value" id="statusSOL">$0.00</span>
        </div>
        <div class="status-item">
            <span class="status-label">Data:</span>
            <span class="status-value" id="statusData">Loading...</span>
        </div>
    </div>

    <div class="container">
        <!-- Hero Stats -->
        <div class="hero-grid" id="heroStats"></div>

        <!-- Best Rip Now -->
        <div class="best-rip-section" id="bestRipSection"></div>

        <!-- Market Trends -->
        <div class="section-title">Market Trends</div>
        <div class="market-trends" id="marketTrends"></div>

        <!-- Live Pull Feed -->
        <div class="section-title">Live Pull Feed</div>
        <div class="pull-feed" id="pullFeed"></div>

        <!-- Leaderboard + Prizes -->
        <div class="leaderboard-container">
            <div class="lb-section" id="leaderboardSection"></div>
            <div class="lb-section" id="prizeSection"></div>
        </div>

        <!-- Pack EV Dashboard -->
        <div class="section-title">Pack EV Dashboard</div>
        <div class="pack-table-wrap">
            <div class="pack-filters" id="packFilters"></div>
            <table class="pack-table" id="packTable">
                <thead>
                    <tr>
                        <th>Pack Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>EV</th>
                        <th>Ratio</th>
                        <th>7d Pulls</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="packTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ===== CONSTANTS & CONFIG =====
        const API_BASE = 'https://api.phygitals.com';
        const CORS_PROXY = 'https://corsproxy.io/?';
        const MY_WALLET = '9Y7KcsQ8XvkAdFpTDQpeTQtqMxcVXvFWEi66R7872kr1';

        // ===== STATE =====
        let allPacks = [];
        let weeklyLB = [];
        let allTimeLB = [];
        let prizes = [];
        let marketTrends = {};
        let deepSalesData = [];
        let mythicHits = {};
        let solPrice = 0;
        let lastRefresh = new Date();
        let currentLBTab = 'weekly';
        let currentPackFilter = 'all';

        // ===== HELPERS =====
        const fmt$ = (v) => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtK = (v) => v >= 1e6 ? (v / 1e6).toFixed(1) + 'M' : v >= 1e3 ? (v / 1e3).toFixed(0) + 'K' : v.toString();
        const shortAddr = (a) => a ? a.substring(0, 6) + '...' + a.substring(a.length - 4) : '???';

        function getISOWeek() {
            const now = new Date();
            const jan1 = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - jan1) / 86400000);
            return now.getFullYear() + '-' + String(Math.ceil((days + jan1.getDay() + 1) / 7)).padStart(2, '0');
        }

        function timeAgo(input) {
            const date = (input instanceof Date) ? input : new Date(input);
            if (isNaN(date)) return '';
            const s = Math.floor((Date.now() - date.getTime()) / 1000);
            if (s < 60) return s + 's ago';
            const m = Math.floor(s / 60);
            if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60);
            if (h < 24) return h + 'h ago';
            const d = Math.floor(h / 24);
            return d + 'd ago';
        }

        function hoursAgo(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d)) return 999;
            return (Date.now() - d.getTime()) / 3600000;
        }

        // ===== API FETCHING =====
        async function apiFetch(path) {
            try {
                const r = await fetch(API_BASE + path, { signal: AbortSignal.timeout(5000) });
                if (r.ok) return r.json();
            } catch (e) { }
            // Fallback to CORS proxy with separate timeout (FIXED: separate controller)
            try {
                const r = await fetch(CORS_PROXY + encodeURIComponent(API_BASE + path), { signal: AbortSignal.timeout(5000) });
                if (!r.ok) throw new Error('API error: ' + r.status);
                return r.json();
            } catch (e) {
                console.warn('API fetch failed for ' + path, e);
                throw e;
            }
        }

        async function fetchSOLPrice() {
            try {
                const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd', { signal: AbortSignal.timeout(5000) });
                const d = await r.json();
                solPrice = d.solana?.usd || 0;
                updateStatus();
            } catch (e) {
                console.warn('SOL price fetch failed', e);
            }
        }

        // ===== MARKET TRENDS CALCULATION (MEDIAN-BASED FOR OUTLIER RESISTANCE) =====
        function calcMarketTrends() {
            const byCategory = {};

            // Group marketplace listings by category
            if (window.arbListings) {
                window.arbListings.forEach(item => {
                    const metaCat = item.metadata?.find(m => (m.trait_type || m.key) === 'Category');
                    const cat = (metaCat?.value || 'Other').toLowerCase();
                    if (!byCategory[cat]) byCategory[cat] = [];
                    byCategory[cat].push(item);
                });
            }

            // Calculate median-based trends per category (NOT mean)
            marketTrends = {};
            for (const [cat, items] of Object.entries(byCategory)) {
                const listingCount = items.length;

                // Calculate real FMV ratio from actual sales prices (median, not mean)
                const prices = items
                    .filter(i => i.price && i.fmv_estimate)
                    .map(i => (i.price / 1e6) / (i.fmv_estimate / 1e6))
                    .sort((a, b) => a - b);

                const realFmvRatio = prices.length > 0
                    ? prices[Math.floor(prices.length / 2)]
                    : 0.85;

                const sellRate = listingCount > 0 ? Math.min(listingCount / 100, 1) : 0.3;
                const liquidityScore = Math.min(listingCount / 50, 1);

                marketTrends[cat] = {
                    listingCount,
                    realFmvRatio,
                    sellRate,
                    liquidity: liquidityScore
                };
            }
        }

        // ===== VARIANCE CALCULATION =====
        function calcVariance(pack) {
            const dist = pack.rarity_distribution || [];
            let variance = 0;
            let maxWeight = 0;
            let topRarity = 'Common';

            dist.forEach(r => {
                const weight = r.weight || 0;
                variance += weight * weight;
                if (weight > maxWeight) {
                    maxWeight = weight;
                    topRarity = r.name;
                }
            });

            const avgWeight = dist.length > 0 ? dist.reduce((s, r) => s + (r.weight || 0), 0) / dist.length : 0;
            const score = Math.sqrt(variance / (dist.length || 1));
            let label = 'Moderate';
            if (score < 2) label = 'Steady';
            else if (score > 4) label = 'Volatile';

            return { score, label, topRarity, maxWeight };
        }

        // ===== PACK SCORING ALGORITHM (ALL 10 WEIGHTED FACTORS) =====
        function calcBestRips() {
            if (!allPacks.length) return [];

            const myIdx = weeklyLB.findIndex(e => e.address === MY_WALLET);
            if (myIdx === -1) return [];

            const me = weeklyLB[myIdx];
            const above = myIdx > 0 ? weeklyLB[myIdx - 1] : null;
            const gapToNext = above ? (above.volume - me.volume) / 1e6 : 0;

            calcMarketTrends();

            return allPacks
                .filter(p => p.in_stock && p.ev > 0)
                .map(p => {
                    const price = Number(p.mint_price) || 1;
                    const evRatio = p.ev / price;
                    const variance = calcVariance(p);
                    const activity = Math.min((p.num_pulls_7d || 0) / 100, 1);
                    const buyback = p.buyback_percent || 0;

                    // Base scores
                    const evScore = Math.min(evRatio, 1.3) / 1.3;
                    const steadyScore = 1 - Math.min(variance.score / 6, 1);
                    const activityScore = activity;
                    const buybackScore = buyback;
                    const lbScore = (gapToNext > 0 && price <= gapToNext * 0.1) ? 1 : 0.5;

                    // Market intelligence scores
                    const cat = (p.category || '').toLowerCase();
                    const mkt = marketTrends[cat] || {};

                    // 1. Real EV adjustment
                    const realFmvRatio = mkt.realFmvRatio || 0.85;
                    const adjustedEv = p.ev * realFmvRatio;
                    const adjustedEvRatio = adjustedEv / price;
                    const adjEvScore = Math.min(adjustedEvRatio, 1.3) / 1.3;

                    // 2. EV spread tightness
                    const evSpread = (p.max_ev && p.min_ev && p.ev > 0) ? (p.max_ev - p.min_ev) / p.ev : 1;
                    const spreadScore = 1 - Math.min(evSpread, 1);

                    // 3. Pull recency
                    let pullRecencyScore = 0.5;
                    if (p.last_pull) {
                        const minsSincePull = (Date.now() - new Date(p.last_pull).getTime()) / 60000;
                        if (minsSincePull < 5) pullRecencyScore = 1.0;
                        else if (minsSincePull < 30) pullRecencyScore = 0.9;
                        else if (minsSincePull < 120) pullRecencyScore = 0.7;
                        else if (minsSincePull < 720) pullRecencyScore = 0.4;
                    }

                    // 4. Market liquidity (FIXED: use real marketplace data, not Math.random())
                    const liquidityScore = mkt.liquidity || 0.3;

                    // 5. EV freshness
                    let freshnessScore = 0.2;
                    if (p.ev_updated_at) {
                        const hrs = hoursAgo(p.ev_updated_at);
                        if (hrs < 1) freshnessScore = 1.0;
                        else if (hrs < 6) freshnessScore = 0.8;
                        else if (hrs < 24) freshnessScore = 0.5;
                    }

                    // Composite with all 10 weighted factors
                    const composite =
                        (adjEvScore * 0.30) +
                        (evScore * 0.10) +
                        (steadyScore * 0.12) +
                        (activityScore * 0.10) +
                        (buybackScore * 0.10) +
                        (spreadScore * 0.06) +
                        (pullRecencyScore * 0.06) +
                        (liquidityScore * 0.06) +
                        (freshnessScore * 0.05) +
                        (lbScore * 0.05);

                    // Reasons
                    let reasons = [];
                    if (adjustedEvRatio >= 1.0) reasons.push('Adj. EV ' + (adjustedEvRatio * 100).toFixed(0) + '%');
                    else if (evRatio >= 1.04) reasons.push('EV ' + (evRatio * 100).toFixed(0) + '%');
                    if (realFmvRatio >= 0.92) reasons.push('Cards sell near FMV');
                    else if (realFmvRatio < 0.80) reasons.push('Cards sell ' + Math.round((1 - realFmvRatio) * 100) + '% below FMV');
                    if (variance.label === 'Steady') reasons.push('Low risk');
                    if (pullRecencyScore >= 0.9) reasons.push('Just pulled');
                    if (activity > 0.5) reasons.push('High activity');
                    if (buyback >= 0.9) reasons.push(Math.round(buyback * 100) + '% buyback');
                    if (freshnessScore >= 0.8) reasons.push('Fresh EV');
                    if (spreadScore >= 0.7) reasons.push('Tight EV range');
                    if (liquidityScore >= 0.6) reasons.push('Liquid market');

                    return {
                        pack: p, composite, evRatio, adjustedEvRatio, variance,
                        realFmvRatio, spreadScore, pullRecencyScore, liquidityScore, freshnessScore,
                        reasons: reasons.length ? reasons.join(' Â· ') : 'Balanced pick'
                    };
                })
                .sort((a, b) => b.composite - a.composite)
                .slice(0, 3);
        }

        // ===== DEEP SALES SCAN =====
        async function scanDeepSales(maxPages = 20) {
            const packById = {};
            allPacks.forEach(p => { if (p.id) packById[String(p.id)] = p; });
            deepSalesData = [];

            for (let pg = 0; pg < maxPages; pg++) {
                try {
                    const d = await apiFetch('/api/marketplace/sales?limit=10&page=' + pg);
                    const sales = d.sales || d || [];
                    if (!sales.length) break;
                    deepSalesData = deepSalesData.concat(sales);

                    sales.forEach(s => {
                                 if (s.type !== 'CLAW' || !s.clawId) return;
                        const pack = packById[String(s.clawId)];
                        if (!pack || !pack.rarity_distribution) return;

                        const amount = s.amount ? s.amount / 1e6 : 0;
                        const mt = pack.rarity_distribution.find(x => (x.name || '').toLowerCase() === 'mythic' || (x.name || '').toLowerCase() === 'legendary');
                        if (!mt) return;

                        const ep = parseFloat(s.ebayListing?.data?.price?.value || 0);
                        const checkVal = ep || amount;

                        if (checkVal >= (mt.lower || mt.lower_value || 0) && (mt.lower || mt.lower_value || 0) > 0) {
                            const ex = mythicHits[String(s.clawId)];
                            if (!ex || new Date(s.time || s.createdAt) > new Date(ex.time)) {
                                mythicHits[String(s.clawId)] = {
                                    card: s.ebayListing?.data?.title || s.nft?.name || 'Unknown',
                                    price: checkVal,
                                    time: s.time || s.createdAt
                                };
                            }
                        }
                    });

                    if (sales.length < 10) break;
                } catch (e) {
                    console.warn('Deep sales page ' + pg + ' failed:', e);
                    break;
                }
            }
        }

        // ===== MARKETPLACE FETCHING (PARALLEL CATEGORIES, SEQUENTIAL PAGES WITHIN EACH) =====
        async function fetchMarketplaceListings() {
            window.arbListings = [];
            const categories = ['Pokemon', 'Basketball', 'Football', 'One Piece', 'Baseball', 'Soccer', 'Yu-Gi-Oh!', 'Creator'];

            // Fetch categories in parallel, but pages within each category sequentially
            const categoryPromises = categories.map(async (cat) => {
                const mc = encodeURIComponent(JSON.stringify({ "Category": [cat] }));
                const catListings = [];

                for (let pg = 0; pg < 10; pg++) {
                    try {
                        const arbResp = await apiFetch('/api/marketplace/marketplace-listings?searchTerm=&sortBy=recently-listed&itemsPerPage=50&page=' + pg + '&metadataConditions=' + mc + '&priceRange=%5Bnull%2Cnull%5D&fmvRange=%5Bnull%2Cnull%5D&listedStatus=listed&collectionAddresses=%5B%5D');
                        const items = Array.isArray(arbResp) ? arbResp : (arbResp.items || arbResp.listings || []);
                        if (!items.length) break;
                        catListings.push(...items);
                        if (items.length < 50) break;
                    } catch (e) {
                        console.warn('Marketplace page ' + pg + ' for ' + cat + ' failed:', e);
                        break;
                    }
                }

                return catListings;
            });

            try {
                const results = await Promise.all(categoryPromises);
                results.forEach(listings => {
                    window.arbListings.push(...listings);
                });
            } catch (e) {
                console.warn('Marketplace fetch error:', e);
            }
        }

        // ===== DATA LOADING =====
        async function loadData() {
            try {
                setProgress(10);

                // Fetch packs and leaderboards in parallel
                const [packsResp, weeklyResp, allTimeResp] = await Promise.all([
                    apiFetch('/api/marketplace/packs').catch(() => ({ packs: [] })),
                    apiFetch('/api/marketplace/leaderboard/weekly?pageSize=200').catch(() => ({ leaderboard: [] })),
                    apiFetch('/api/marketplace/leaderboard?pageSize=200').catch(() => ({ leaderboard: [] }))
                ]);

                allPacks = packsResp.packs || packsResp || [];
                weeklyLB = weeklyResp.leaderboard || weeklyResp || [];
                allTimeLB = allTimeResp.leaderboard || allTimeResp || [];

                setProgress(30);

                // Fetch prizes (FIXED: now fetches prize data)
                try {
                    const weekNum = getISOWeek();
                    const prizeResp = await apiFetch('/api/marketplace/prize-data?week=' + weekNum);
                    prizes = prizeResp.prizes || prizeResp || [];
                } catch (e) {
                    console.warn('Prize fetch failed:', e);
                }

                setProgress(50);

                // Fetch marketplace listings (categories in parallel, pages sequential)
                await fetchMarketplaceListings();

                setProgress(70);

                // Fetch SOL price
                await fetchSOLPrice();

                // Deep sales scan
                await scanDeepSales(20);

                setProgress(90);

                renderAll();

                lastRefresh = new Date();
                updateStatus();
                setProgress(100);
                setTimeout(() => setProgress(0), 500);
            } catch (e) {
                console.error('Load failed:', e);
                updateStatus();
            }
        }

        // ===== RENDERING =====
        function setProgress(pct) {
            document.getElementById('progressBar').style.width = pct + '%';
            if (pct === 100) document.getElementById('progressBar').classList.add('complete');
            else document.getElementById('progressBar').classList.remove('complete');
        }

        function updateStatus() {
            const now = new Date();
            document.getElementById('statusTime').textContent = now.toLocaleTimeString().substring(0, 5);
            document.getElementById('statusSOL').textContent = solPrice ? '$' + solPrice.toFixed(2) : '$0.00';
            const mins = Math.floor((Date.now() - lastRefresh.getTime()) / 60000);
            document.getElementById('statusData').textContent = mins > 0 ? mins + 'm ago' : 'now';
        }

        function renderAll() {
            renderHero();
            renderBestRips();
            renderMarketTrends();
            renderPullFeed();
            renderLeaderboard();
            renderPrizes();
            renderPacks();
        }

        function renderHero() {
            const myIdx = weeklyLB.findIndex(e => e.address === MY_WALLET);
            if (myIdx === -1) {
                document.getElementById('heroStats').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">Wallet not found in leaderboard</div>';
                return;
            }

            const me = weeklyLB[myIdx];
            const above = myIdx > 0 ? weeklyLB[myIdx - 1] : null;
            const below = myIdx < weeklyLB.length - 1 ? weeklyLB[myIdx + 1] : null;

            // FIXED: Gap to Next = gap to rank ABOVE (#myIdx), Lead Over Below = gap to rank BELOW (#myIdx+2)
            const gapUp = above ? (above.volume - me.volume) / 1e6 : 0;
            const gapDown = below ? (me.volume - below.volume) / 1e6 : 0;

            const html = `
                <div class="hero-card">
                    <div class="label">Rank</div>
                    <div class="value">#${myIdx + 1}</div>
                    <div class="sub">of ${weeklyLB.length}</div>
                </div>
                <div class="hero-card">
                    <div class="label">Volume</div>
                    <div class="value">${fmt$(me.volume / 1e6)}</div>
                    <div class="sub">This week</div>
                </div>
                <div class="hero-card">
                    <div class="label">Points</div>
                    <div class="value">${(me.points || 0).toLocaleString()}</div>
                    <div class="sub">Leaderboard</div>
                </div>
                <div class="hero-card">
                    <div class="label">Packs</div>
                    <div class="value">${(me.num_packs || 0).toLocaleString()}</div>
                    <div class="sub">Pulled</div>
                </div>
                <div class="hero-card">
                    <div class="label">Gap to #${myIdx}</div>
                    <div class="value">${fmt$(gapUp)}</div>
                    <div class="sub">${above ? 'to ' + shortAddr(above.address) : 'N/A'}</div>
                </div>
                <div class="hero-card">
                    <div class="label">Lead over #${myIdx + 2}</div>
                    <div class="value">${fmt$(gapDown)}</div>
                    <div class="sub">${below ? 'over ' + shortAddr(below.address) : 'N/A'}</div>
                </div>
            `;

            document.getElementById('heroStats').innerHTML = html;
        }

        function renderBestRips() {
            const rips = calcBestRips();
            if (!rips.length) {
                document.getElementById('bestRipSection').innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No packs available</p>';
                return;
            }

            const cardsHtml = rips.map((r, i) => {
                const p = r.pack;
                return `
                    <div class="rip-card">
                        <div class="rip-rank">#${i + 1}</div>
                        <div class="rip-name">${p.name}</div>
                        <div class="rip-cat">${p.category || 'Unknown'}</div>
                        <div class="rip-stats">
                            <div><span class="rip-label">EV Ratio</span></div>
                            <div><span class="rip-val">${(r.adjustedEvRatio * 100).toFixed(0)}%</span></div>
                            <div><span class="rip-label">Liquidity</span></div>
                            <div><span class="rip-val">${(r.liquidityScore * 100).toFixed(0)}%</span></div>
                            <div><span class="rip-label">Recency</span></div>
                            <div><span class="rip-val">${(r.pullRecencyScore * 100).toFixed(0)}%</span></div>
                            <div><span class="rip-label">Composite</span></div>
                            <div><span class="rip-val">${(r.composite * 100).toFixed(0)}%</span></div>
                        </div>
                        <div class="rip-reason">${r.reasons}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('bestRipSection').innerHTML = `
                <div class="best-rip-header">
                    <div>
                        <div class="best-rip-title">Best Rip Now</div>
                        <div class="best-rip-subtitle">Top 3 by composite score: Adjusted EV, risk, liquidity, recency, freshness</div>
                    </div>
                </div>
                <div class="best-rip-cards">${cardsHtml}</div>
            `;
        }

        function renderMarketTrends() {
            const container = document.getElementById('marketTrends');
            if (!Object.keys(marketTrends).length) {
                container.innerHTML = '<div style="color: var(--text-secondary);">No market data</div>';
                return;
            }

            const html = Object.entries(marketTrends).map(([cat, mkt]) => `
                <div class="trend-card">
                    <div class="cat-name">${cat.charAt(0).toUpperCase() + cat.slice(1)}</div>
                    <div class="metric">
                        <span>Listings:</span>
                        <span class="metric-val">${mkt.listingCount || 0}</span>
                    </div>
                    <div class="metric">
                        <span>FMV Ratio:</span>
                        <span class="metric-val">${((mkt.realFmvRatio || 0) * 100).toFixed(0)}%</span>
                    </div>
                    <div class="metric">
                        <span>Liquidity:</span>
                        <span class="metric-val">${((mkt.liquidity || 0) * 100).toFixed(0)}%</span>
                    </div>
                    <div class="metric">
                        <span>Sell Rate:</span>
                        <span class="metric-val">${((mkt.sellRate || 0) * 100).toFixed(0)}%</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function renderPullFeed() {
            const container = document.getElementById('pullFeed');
            const sales = deepSalesData.slice(0, 20);

            if (!sales.length) {
                container.innerHTML = '<div class="pull-feed-empty">No recent pulls</div>';
                return;
            }

            const html = sales.map(s => {
                const rarity = (s.nft?.rarity || 'common').toLowerCase();
                const rarityClass = 'rarity-' + rarity;
                const amount = s.amount ? (s.amount / 1e6) : 0;
                const ago = timeAgo(s.time || s.createdAt);

                return `
                    <div class="pull-item">
                        <div class="pull-rarity ${rarityClass}"></div>
                        <div class="pull-info">
                            <div class="pull-title">${s.nft?.name || s.ebayListing?.data?.title || 'Unknown'}</div>
                            <div class="pull-detail">${s.nft?.pack_name || 'Unknown'}</div>
                        </div>
                        <div class="pull-value">${fmt$(amount)}</div>
                        <div class="pull-time">${ago}</div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `<div class="pull-feed-scroll">${html}</div>`;
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboardSection');
            const myIdx = weeklyLB.findIndex(e => e.address === MY_WALLET);
            const data = weeklyLB;

            const rows = data.slice(0, 15).map((lb, idx) => {
                const isMe = lb.address === MY_WALLET;
                const rowClass = isMe ? 'me-row' : '';
                let rankBadgeHtml = '';
                if (idx < 3) {
                    const rankClasses = ['rank-1', 'rank-2', 'rank-3'];
                    rankBadgeHtml = `<span class="rank-badge ${rankClasses[idx]}">${idx + 1}</span>`;
                }

                return `
                    <tr class="${rowClass}">
                        <td>${rankBadgeHtml || (idx + 1)}</td>
                        <td>${shortAddr(lb.address)}</td>
                        <td class="points-col">${fmt$(lb.volume / 1e6)}</td>
                        <td>${(lb.points || 0).toLocaleString()}</td>
                        <td>${(lb.num_packs || 0).toLocaleString()}</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="tab-row">
                    <button class="tab-btn active">Weekly Top 15</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Address</th>
                            <th>Volume</th>
                            <th>Points</th>
                            <th>Packs</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderPrizes() {
            const container = document.getElementById('prizeSection');
            const prizeNames = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th', '8th', '9th', '10th'];

            const html = prizeNames.map((name, i) => {
                const prize = prizes[i] || { amount: '?', description: 'TBD' };
                return `
                    <div class="prize-card">
                        <div class="rank-title p${i + 1}">${name}</div>
                        <div class="prize-desc">${prize.description || prize.amount || 'Prize'}</div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="tab-row">
                    <button class="tab-btn active">Week ${getISOWeek()}</button>
                </div>
                <div class="prize-grid">${html}</div>
            `;
        }

        function renderPacks() {
            const container = document.getElementById('packTableBody');
            if (!allPacks.length) {
                container.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-secondary);">No packs loaded</td></tr>';
                return;
            }

            const rows = allPacks.slice(0, 30).map(p => {
                const price = Number(p.mint_price) || 1;
                const ratio = (p.ev / price).toFixed(2);
                const cat = (p.category || '').toLowerCase();
                const catBadge = p.category ? `<span class="cat-badge cat-${cat}">${p.category}</span>` : '';
                const status = p.in_stock ? 'â' : 'Sold';
                const statusColor = p.in_stock ? 'var(--accent-green)' : 'var(--text-secondary)';

                return `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td>${catBadge}</td>
                        <td>${fmt$(price)}</td>
                        <td>${fmt$(p.ev || 0)}</td>
                        <td>${ratio}x</td>
                        <td>${(p.num_pulls_7d || 0).toLocaleString()}</td>
                        <td style="color: ${statusColor}"><strong>${status}</strong></td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = rows;
        }

        // ===== INITIALIZATION & AUTO-REFRESH =====
        async function initialize() {
            await loadData();
            setInterval(updateStatus, 5000);
            setInterval(() => {
                loadData().catch(e => console.error('Refresh failed:', e));
            }, 120000);
        }

        initialize().catch(console.error);
    </script>
